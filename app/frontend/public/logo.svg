<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 54">
  <defs>
    <!-- Blue gemstone iris gradient -->
    <radialGradient id="iris" cx="38%" cy="33%" r="62%">
      <stop offset="0%"   stop-color="#8BBAD8"/>
      <stop offset="22%"  stop-color="#3262A0"/>
      <stop offset="58%"  stop-color="#122048"/>
      <stop offset="100%" stop-color="#060D1E"/>
    </radialGradient>
    <!-- Glow for star highlight -->
    <filter id="sg" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.3" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Upward fan of rays (like the real logo — not a full starburst) -->
  <g stroke="#C4963A" stroke-linecap="round">
    <line stroke-width="1.2" x1="27" y1="19" x2="21" y2="15"/>
    <line stroke-width="1.3" x1="27" y1="19" x2="22" y2="12.8"/>
    <line stroke-width="1.4" x1="27" y1="19" x2="23.5" y2="10.7"/>
    <line stroke-width="1.5" x1="27" y1="19" x2="27"   y2="9"/>
    <line stroke-width="1.4" x1="27" y1="19" x2="30.5" y2="10.7"/>
    <line stroke-width="1.3" x1="27" y1="19" x2="32"   y2="12.8"/>
    <line stroke-width="1.2" x1="27" y1="19" x2="33"   y2="15"/>
  </g>

  <!-- Eye outline — clean almond shape -->
  <path d="M15,27 C19.5,19.5 23.5,19 27,19 C30.5,19 34.5,19.5 39,27
           C34.5,34 30.5,34.8 27,34.8 C23.5,34.8 19.5,34 15,27 Z"
        fill="none" stroke="#C4963A" stroke-width="1.6"/>

  <!-- Iris — blue gemstone -->
  <circle cx="27" cy="27" r="6.5" fill="url(#iris)"/>

  <!-- Star / cross highlight (blurred) -->
  <g filter="url(#sg)">
    <line x1="27" y1="22.5" x2="27" y2="31.5" stroke="white" stroke-width="0.8" opacity="0.92"/>
    <line x1="22.5" y1="27" x2="31.5" y2="27"  stroke="white" stroke-width="0.8" opacity="0.92"/>
  </g>
  <!-- Small specular highlight top-left of iris -->
  <ellipse cx="24.8" cy="25.1" rx="1.7" ry="1.0"
           fill="white" opacity="0.28" transform="rotate(-22 24.8 25.1)"/>

  <!-- KAIROS — gold, bold serif -->
  <text x="51" y="26"
        font-family="Georgia,'Times New Roman',serif"
        font-size="17" font-weight="bold"
        fill="#C9A040" letter-spacing="2.8">KAIROS</text>

  <!-- DISTRIBUIDORA — cream, spaced -->
  <text x="51.5" y="40"
        font-family="Georgia,'Times New Roman',serif"
        font-size="8.5"
        fill="#E8DCC8" letter-spacing="3.4">DISTRIBUIDORA</text>
</svg>
