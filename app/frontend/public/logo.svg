<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- Eye with golden rays icon -->
  <g transform="translate(30,30)">
    <!-- Rays -->
    <g stroke="#C9A040" stroke-width="1.8" stroke-linecap="round">
      <line x1="0" y1="-20" x2="0" y2="-14"/>
      <line x1="14.1" y1="-14.1" x2="9.9" y2="-9.9"/>
      <line x1="20" y1="0" x2="14" y2="0"/>
      <line x1="14.1" y1="14.1" x2="9.9" y2="9.9"/>
      <line x1="0" y1="20" x2="0" y2="14"/>
      <line x1="-14.1" y1="14.1" x2="-9.9" y2="9.9"/>
      <line x1="-20" y1="0" x2="-14" y2="0"/>
      <line x1="-14.1" y1="-14.1" x2="-9.9" y2="-9.9"/>
    </g>
    <!-- Eye outline -->
    <path d="M-11,0 Q0,-8 11,0 Q0,8 -11,0 Z" fill="none" stroke="#C9A040" stroke-width="1.8"/>
    <!-- Iris -->
    <circle cx="0" cy="0" r="4.5" fill="#C9A040"/>
    <!-- Pupil -->
    <circle cx="0" cy="0" r="2" fill="#2C1F16"/>
    <!-- Eye shine -->
    <circle cx="1.5" cy="-1.5" r="0.8" fill="#FAF7F2"/>
  </g>
  <!-- KAIROS DISTRIBUIDORA text -->
  <text x="58" y="26" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-weight="bold" fill="#4A3728" letter-spacing="2">KAIROS</text>
  <text x="58" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="#6B4F3A" letter-spacing="3">DISTRIBUIDORA</text>
</svg>
